spring:
  application:
    name: party-showcase
  profiles:
    default: jdbc
  mvc:
    problemdetails:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info

---
spring:
  config:
    activate:
      on-profile: "!jdbc"
  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration
      - org.springframework.boot.data.jdbc.autoconfigure.DataJdbcRepositoriesAutoConfiguration

---
spring:
  config:
    activate:
      on-profile: jdbc
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/party_showcase}
    username: ${DB_USER:party}
    password: ${DB_PASSWORD:party}
  flyway:
    enabled: true
    baseline-on-migrate: true
    fail-on-missing-locations: true
    locations: classpath:db/migration/party,classpath:db/migration/address,classpath:db/migration/capability,classpath:db/migration/relationship

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: party_showcase
      POSTGRES_USER: party
      POSTGRES_PASSWORD: party
    ports:
      - "5432:5432"
    volumes:
      - party-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U party -d party_showcase"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  party-db:

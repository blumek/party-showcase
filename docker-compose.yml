services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: party_showcase
      POSTGRES_USER: party
      POSTGRES_PASSWORD: party
    ports:
      - "5432:5432"
    volumes:
      - party-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U party -d party_showcase"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    image: party-showcase
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/party_showcase
      DB_USER: party
      DB_PASSWORD: party
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

volumes:
  party-db:
